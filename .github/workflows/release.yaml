name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read
  id-token: write

jobs:
  release:
    uses: photon-hq/buildspace/.github/workflows/typescript-service-release.yaml@main
    with:
      service-name: create-spectrum-project
      working-directory: "."
      build-command: "bun run build"
      # First publish has to go through NPM_TOKEN — npm OIDC Trusted Publishing
      # can only be configured on npmjs.com after the package already exists,
      # so the chicken-and-egg gets resolved by bootstrapping with the token.
      # Flip back to true once create-spectrum-project is live and the trusted
      # publisher is configured for this repo + Release workflow on npmjs.com.
      use-oidc: false
      dry-run: false
    secrets: inherit
